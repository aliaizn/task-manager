services:
  db:
    image: postgres:16
    container_name: task-db
    environment:
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - task-db-data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: unless-stopped

  app:
    build: .
    container_name: task-app
    ports:
      - "5005:5005"
    depends_on:
      - db
    environment:
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
    restart: unless-stopped

volumes:
  task-db-data: